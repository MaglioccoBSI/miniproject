
- hosts: deploy
  become: yes
  tasks:
    - name: Install NodeJS
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: Install git
      apt:
        name: git
        state: present

    - name: Clone repo
      git:
        repo: "https://gitlab.com/Reece-Elder/devops-m5-nodeproject.git"
        dest: /home/ubuntu/app

    - name: Install dependencies
      command: npm install
      args:
        chdir: /home/ubuntu/app

    - name: Run app
      command: node app.js
      args:
        chdir: /home/ubuntu/app
